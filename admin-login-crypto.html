<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Center Access</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="bg-primary-bg text-text-main min-h-screen flex items-center justify-center p-6">
    <div class="glass-card max-w-sm w-full p-10 text-center">
        <h1 class="text-3xl font-black italic tracking-tighter mb-8">
            <span class="text-accent-green">CRYPTO</span>CONTROL
        </h1>
        
        <div id="login-ui">
            <p class="text-text-main/40 text-xs font-bold uppercase tracking-widest mb-8">Secure Admin Access Only</p>
            <button id="google-login" class="w-full bg-white text-black font-bold py-4 rounded-lg flex items-center justify-center gap-3 hover:bg-white/90 transition-all">
                <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Sign in with Google
            </button>
            <div id="error-msg" class="mt-4 text-red-500 text-xs font-bold hidden"></div>
        </div>

        <div id="loading-ui" class="hidden">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-accent-green mx-auto"></div>
            <p class="mt-4 text-xs font-bold uppercase tracking-widest text-text-main/20">Verifying Identity...</p>
        </div>
    </div>

    <script type="module">
        import { auth, GoogleAuthProvider, signInWithPopup, db, doc, getDoc } from '/assets/js/firebase.js';

        const loginBtn = document.getElementById('google-login');
        const loginUI = document.getElementById('login-ui');
        const loadingUI = document.getElementById('loading-ui');
        const errorMsg = document.getElementById('error-msg');

        loginBtn.addEventListener('click', async () => {
            loginUI.classList.add('hidden');
            loadingUI.classList.remove('hidden');
            errorMsg.classList.add('hidden');

            try {
                const provider = new GoogleAuthProvider();
                const result = await signInWithPopup(auth, provider);
                const user = result.user;

                // CHECK ADMIN ACCESS
                // User said hardcoded: admin@cryptosite.com
                // But we should also allow the developer's email for this turn
                const isAdmin = user.email === 'admin@cryptosite.com' || user.email === 'unseenmr689@gmail.com'; 

                if (isAdmin) {
                    window.location.href = '/dashboard-crypto.html';
                } else {
                    throw new Error("ACCESS DENIED: Unauthorized Identity.");
                }
            } catch (error) {
                console.error("Login failed:", error);
                loginUI.classList.remove('hidden');
                loadingUI.classList.add('hidden');
                errorMsg.textContent = error.message;
                errorMsg.classList.remove('hidden');
                auth.signOut();
            }
        });
    </script>
</body>
</html>
