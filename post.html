<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review - CryptoReview Pro</title>
    <meta id="meta-description" name="description" content="Read full crypto review on CryptoReview Pro.">
    
    <!-- Open Graph -->
    <meta id="og-title" property="og:title" content="CryptoReview">
    <meta id="og-desc" property="og:description" content="Crypto review.">
    <meta id="og-image" property="og:image" content="">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body class="bg-primary-bg text-text-main">
    <!-- Navbar (Simplified for reading) -->
    <nav class="bg-primary-bg/80 backdrop-blur-lg border-b border-white/5 h-20 flex items-center">
        <div class="max-w-4xl mx-auto w-full px-6 flex items-center justify-between">
            <a href="/" class="flex items-center gap-3">
                <div class="logo-icon"></div>
                <span class="text-lg font-bold tracking-tight text-white uppercase italic">CRYPTO<span class="text-accent-green">REVIEW</span></span>
            </a>
            <a href="/" class="text-[10px] font-bold uppercase tracking-widest text-text-main/40 hover:text-accent-green transition-colors flex items-center gap-2">
                &lsaquo; Back to Database
            </a>
        </div>
    </nav>

    <article id="post-article" class="max-w-4xl mx-auto px-6 py-20 opacity-0 transition-opacity duration-1000">
        <header class="mb-16">
            <div id="post-category" class="inline-block px-3 py-1 rounded bg-accent-green/10 text-accent-green text-[10px] font-black uppercase tracking-widest mb-6 border border-accent-green/20">
                CATEGORY
            </div>
            <h1 id="post-title" class="text-5xl lg:text-7xl font-black tracking-tighter mb-8 leading-[0.95]">
                Loading Intelligence...
            </h1>
            <div class="flex items-center gap-4 text-xs font-bold uppercase tracking-widest text-text-main/40">
                <span id="post-date">DATE</span>
                <span>&bull;</span>
                <span id="post-read-time">5 MIN READ</span>
            </div>
        </header>

        <div class="ad-slot" data-ad="in-post-header">Ad Placeholder</div>

        <div class="aspect-video mb-16 overflow-hidden rounded-3xl shadow-3xl">
            <img id="post-image" src="" alt="" class="w-full h-full object-cover">
        </div>

        <section id="post-content" class="post-content mb-20">
            <!-- Content Injected Here -->
        </section>

        <div class="ad-slot" data-ad="in-post-footer">Ad Placeholder</div>

        <footer class="pt-20 border-t border-white/5">
            <div class="flex items-center justify-between gap-6 flex-wrap">
                <div class="flex items-center gap-4">
                    <span class="text-xs font-bold uppercase tracking-widest text-text-main/40">Share this intel:</span>
                    <div class="flex items-center gap-3">
                        <button class="w-10 h-10 rounded-full bg-secondary-bg hover:bg-accent-blue transition-all flex items-center justify-center">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"></path></svg>
                        </button>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-xs font-bold uppercase tracking-widest text-text-main/40">Tagged:</span>
                    <span id="post-tags" class="text-xs font-bold uppercase text-accent-green">CRYPTO, REVIEW</span>
                </div>
            </div>
        </footer-banner>

        <!-- Sidebar Sticky Ad Simulation (Mobile) -->
        <div class="fixed bottom-10 right-10 hidden lg:block z-50">
           <div class="w-48 h-96 bg-card-bg border border-white/10 rounded-xl p-4 flex flex-col items-center justify-center group relative cursor-pointer">
               <span class="text-[10px] text-text-main/20 uppercase tracking-widest absolute top-2">Sticky Sidebar Ad</span>
               <div class="w-full h-full bg-secondary-bg/50 rounded flex items-center justify-center">
                   <span class="text-xs font-black text-accent-blue/30 rotate-45">BOOST TRADING</span>
               </div>
               <button class="absolute -top-2 -right-2 bg-red-500 w-6 h-6 rounded-full text-white text-[10px] flex items-center justify-center" onclick="this.parentElement.remove()">X</button>
           </div>
        </div>
    </article>

    <section class="bg-secondary-bg/30 py-20">
        <div class="max-w-4xl mx-auto px-6">
            <h3 class="text-2xl font-bold mb-10 tracking-tight">Related Intel</h3>
            <div id="related-posts" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- Related posts here -->
            </div>
        </div>
    </section>

    <!-- Scripts -->
    <script type="module">
        import { db, collection, getDocs, query, where, limit, getDoc, doc } from '/assets/js/firebase.js';
        import { renderPostCard } from '/assets/js/main.js';

        async function loadPost() {
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('slug');

            if (!slug) {
                window.location.href = '/';
                return;
            }

            try {
                // Find post by slug
                const q = query(collection(db, 'posts'), where('slug', '==', slug), limit(1));
                const snapshot = await getDocs(q);
                
                if (snapshot.empty) {
                    document.getElementById('post-title').textContent = "404 - Intel Missing";
                    document.getElementById('post-article').style.opacity = '1';
                    return;
                }

                const postData = snapshot.docs[0].data();
                
                // Update Metadata for SEO
                document.title = `${postData.metaTitle || postData.title} - CryptoReview Pro`;
                document.getElementById('meta-description').content = postData.metaDescription || postData.excerpt || '';
                document.getElementById('og-title').content = postData.title;
                document.getElementById('og-desc').content = postData.excerpt || '';
                document.getElementById('og-image').content = postData.featuredImage || '';

                // Render Content
                document.getElementById('post-title').textContent = postData.title;
                document.getElementById('post-category').textContent = postData.category;
                document.getElementById('post-date').textContent = postData.createdAt?.toDate ? postData.createdAt.toDate().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }) : new Date(postData.createdAt).toLocaleDateString();
                document.getElementById('post-image').src = postData.featuredImage || 'https://images.unsplash.com/photo-1639762681485-074b7f938ba0?q=80&w=2064&auto=format&fit=crop';
                
                // Process content for CTA buttons
                // Custom logic: if content has [CTA: Text | Link], replace with styled button
                let content = postData.content;
                content = content.replace(/\[CTA: (.*?) \| (.*?)\]/g, (match, text, link) => {
                    return `
                        <div class="cta-container">
                            <a href="${link}" target="_blank" rel="noopener noreferrer" class="cta-neon">
                                ${text}
                            </a>
                        </div>
                    `;
                });
                
                document.getElementById('post-content').innerHTML = content;
                document.getElementById('post-article').classList.remove('opacity-0');
                
                loadRelated(postData.category, slug);
            } catch (error) {
                console.error("Error loading post:", error);
            }
        }

        async function loadRelated(category, currentSlug) {
            const grid = document.getElementById('related-posts');
            try {
                const q = query(collection(db, 'posts'), where('category', '==', category), where('published', '==', true), limit(3));
                const snapshot = await getDocs(q);
                const related = snapshot.docs.filter(d => d.data().slug !== currentSlug).slice(0, 2);
                
                if (related.length === 0) {
                    grid.innerHTML = '<p class="text-text-main/20 uppercase tracking-widest text-[10px]">No related intel found.</p>';
                    return;
                }

                grid.innerHTML = related.map(doc => renderPostCard({ id: doc.id, ...doc.data() })).join('');
            } catch (error) {
                console.error("Error related posts:", error);
            }
        }

        loadPost();
    </script>
    <script type="module" src="/assets/js/main.js"></script>
</body>
</html>
